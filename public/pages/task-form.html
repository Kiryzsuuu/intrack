<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/img/logo.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intrack — Form Task</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="/styles/base.css">
  <style>
    .card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--r-lg);
      padding: 24px;
    }
    .card-title {
      font-size: 12px; font-weight: 700;
      color: var(--text-3); text-transform: uppercase;
      letter-spacing: .7px; margin-bottom: 20px;
      padding-bottom: 12px; border-bottom: 0.5px solid var(--border);
    }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 12px; font-weight: 600; color: var(--text-2); }
    .field input, .field textarea, .field select {
      background: var(--surface-2);
      border: 0.5px solid var(--border);
      border-radius: var(--r-sm);
      padding: 10px 13px;
      font-size: 14px; color: var(--text);
      outline: none; transition: var(--transition); width: 100%;
    }
    .field input:focus, .field textarea:focus, .field select:focus {
      border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); background: var(--surface);
    }
    .field input::placeholder, .field textarea::placeholder { color: var(--text-3); }
    .field textarea { resize: vertical; }
    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

    /* Assignees picker */
    .assignee-picker { position: relative; }
    .assignee-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
    .assignee-chip {
      display: flex; align-items: center; gap: 5px;
      background: var(--accent-light); color: var(--accent);
      border: 0.5px solid var(--accent); border-radius: 100px;
      padding: 3px 10px; font-size: 12px; font-weight: 600;
    }
    .assignee-chip button {
      background: none; border: none; cursor: pointer; color: var(--accent);
      padding: 0; font-size: 13px; line-height: 1; display: flex; align-items: center;
    }
    .assignee-chip button:hover { color: var(--red); }
    .assignee-dropdown {
      position: absolute; top: calc(100% + 4px); left: 0; right: 0; z-index: 100;
      background: var(--surface); border: 0.5px solid var(--border);
      border-radius: var(--r-sm); box-shadow: 0 8px 24px rgba(0,0,0,.15);
      max-height: 220px; overflow-y: auto; display: none;
    }
    .assignee-dropdown.open { display: block; }
    .assignee-drop-item {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 12px; cursor: pointer; font-size: 13px;
      transition: background .1s;
    }
    .assignee-drop-item:hover { background: var(--surface-2); }
    .assignee-drop-empty { padding: 12px; font-size: 13px; color: var(--text-3); text-align: center; }

    /* Subtasks */
    .st-row { display:flex; align-items:center; gap:8px; padding:8px 0; border-bottom:0.5px dashed var(--border); }
    .st-row input.st-judul { flex:1; }
    .st-mini { font-size:11px; color:var(--text-3); }
    .st-assignees { display:flex; flex-wrap:wrap; gap:4px; }
    .st-chip { background:var(--accent-light); color:var(--accent); font-size:11px; padding:2px 8px; border-radius:100px; }
    .icon-btn { background:none; border:0.5px solid var(--border); border-radius:var(--r-sm); cursor:pointer; color:var(--text-2); padding:6px 8px; font-size:13px; }
    .icon-btn:hover { border-color:var(--accent); color:var(--accent); }
    .icon-btn.on { border-color:var(--accent); color:var(--accent); background:var(--accent-light); }
    .st-assign-panel {
      display:flex; flex-wrap:wrap; gap:8px; padding:8px 10px; margin:2px 0 6px 30px;
      background:var(--surface-2); border:0.5px solid var(--border); border-radius:var(--r-sm);
    }
    .st-assign-item { display:flex; align-items:center; gap:6px; font-size:12px; cursor:pointer; }

    @media(max-width:700px){ .row-2,.row-3{ grid-template-columns:1fr } }
    @keyframes spin { to { transform:rotate(360deg) } }
  </style>
</head>
<body>
<div class="app">
  <aside id="sidebar" class="sidebar" data-page="tasks"></aside>
  <div class="main">
    <div class="topbar">
      <div class="bc">
        <a href="/pages/list.html">Task</a>
        <span class="bc-sep">/</span>
        <span class="cur" id="bc-title">Buat Task Baru</span>
      </div>
      <div class="topbar-right">
        <a href="/pages/list.html" class="btn">Batal</a>
        <button class="btn btn-primary" id="btn-submit" onclick="submitForm()">
          <i class="ti ti-check"></i> <span id="btn-label">Simpan Task</span>
        </button>
      </div>
    </div>

    <div class="page-scroll">
      <div class="page-content">

        <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
          <div style="font-size:20px;font-weight:800;letter-spacing:-.4px" id="form-heading">Buat Task Baru</div>
        </div>

        <!-- Template Picker -->
        <div class="card" id="template-picker-card">
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
            <i class="ti ti-copy" style="font-size:16px;color:var(--accent)"></i>
            <span style="font-size:13px;font-weight:600">Mulai dari Template</span>
            <select id="tpl-picker" style="flex:1;min-width:200px;padding:8px 12px;border-radius:var(--r-sm);border:0.5px solid var(--border);background:var(--surface-2);color:var(--text);font-size:13px;outline:none">
              <option value="">— Pilih template (opsional) —</option>
            </select>
            <button class="btn btn-primary" onclick="applyTemplate()" style="font-size:12px" id="tpl-apply-btn" disabled><i class="ti ti-arrow-right"></i> Terapkan</button>
          </div>
        </div>

        <!-- Informasi Task -->
        <div class="card">
          <div class="card-title">Informasi Task</div>
          <div class="field" style="margin-bottom:16px">
            <label>Judul Task <span style="color:var(--red)">*</span></label>
            <input type="text" id="f-judul" placeholder="Masukkan judul task yang jelas dan spesifik..." maxlength="150">
            <div style="font-size:11px;color:var(--text-3);text-align:right"><span id="char-count">0</span>/150</div>
          </div>
          <div class="field">
            <label>Deskripsi <span style="color:var(--red)">*</span></label>
            <textarea id="f-deskripsi" rows="5" placeholder="Jelaskan detail pekerjaan, ruang lingkup, dan hasil yang diharapkan..."></textarea>
          </div>
        </div>

        <!-- Jadwal -->
        <div class="card">
          <div class="card-title">Prioritas & Jadwal</div>
          <div class="row-2">
            <div class="field">
              <label>Prioritas <span style="color:var(--red)">*</span></label>
              <select id="f-prioritas">
                <option value="normal">Normal</option>
                <option value="moderate">Moderate</option>
                <option value="urgent">Urgent</option>
              </select>
            </div>
            <div class="field">
              <label>Deadline <span style="color:var(--red)">*</span></label>
              <input type="date" id="f-deadline">
            </div>
          </div>
        </div>

        <!-- Assignees -->
        <div class="card">
          <div class="card-title">Assignee <span style="text-transform:none;font-weight:400;color:var(--text-3)">(bisa lebih dari satu)</span> <span style="color:var(--red)">*</span></div>
          <div class="assignee-picker">
            <div class="assignee-chips" id="assignee-chips"></div>
            <input type="text" id="assignee-search" placeholder="Cari nama assignee..." autocomplete="off"
              style="background:var(--surface-2);border:0.5px solid var(--border);border-radius:var(--r-sm);padding:9px 12px;font-size:13px;color:var(--text);outline:none;width:100%">
            <div class="assignee-dropdown" id="assignee-dropdown"></div>
          </div>
        </div>

        <!-- Co-creator (hanya diatur creator utama) -->
        <div class="card" id="creator-card">
          <div class="card-title">Task Creator Tambahan <span style="text-transform:none;font-weight:400;color:var(--text-3)">(opsional, bisa banyak)</span></div>
          <div class="assignee-picker">
            <div class="assignee-chips" id="creator-chips"></div>
            <input type="text" id="creator-search" placeholder="Cari nama creator..." autocomplete="off"
              style="background:var(--surface-2);border:0.5px solid var(--border);border-radius:var(--r-sm);padding:9px 12px;font-size:13px;color:var(--text);outline:none;width:100%">
            <div class="assignee-dropdown" id="creator-dropdown"></div>
          </div>
        </div>

        <!-- Task Approval (direktur) -->
        <div class="card" id="validator-card">
          <div class="card-title">Task Approval <span style="text-transform:none;font-weight:400;color:var(--text-3)">(direktur — salah satu approve = complete)</span></div>
          <div class="assignee-picker">
            <div class="assignee-chips" id="validator-chips"></div>
            <input type="text" id="validator-search" placeholder="Cari nama direktur..." autocomplete="off"
              style="background:var(--surface-2);border:0.5px solid var(--border);border-radius:var(--r-sm);padding:9px 12px;font-size:13px;color:var(--text);outline:none;width:100%">
            <div class="assignee-dropdown" id="validator-dropdown"></div>
          </div>
        </div>

        <!-- Subtasks -->
        <div class="card" id="subtask-card" style="display:none">
          <div class="card-title">Subtask <span style="text-transform:none;font-weight:400;color:var(--text-3)">(bisa bersarang & di-assign)</span></div>
          <div id="subtask-tree"></div>
          <button type="button" class="btn" style="margin-top:12px" onclick="startAddSubtask(null)"><i class="ti ti-plus"></i> Tambah Subtask</button>
        </div>

      </div>
    </div>
  </div>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/search.js"></script>
<script src="/js/sidebar.js"></script>
<script src="/js/webpush.js"></script>
<script>
if (!requireAuth()) throw 'redirect';
const user   = getUser();
const editId = new URLSearchParams(window.location.search).get('id');
let selectedAssignees = new Set();
let allUsers = [];
let subtasks = [];   // flat list dari API (saat edit)

document.getElementById('f-deadline').min = new Date().toISOString().split('T')[0];

document.getElementById('f-judul').addEventListener('input', function () {
  document.getElementById('char-count').textContent = this.value.length;
});

document.getElementById('assignee-search').addEventListener('input', function () {
  renderAssigneeDropdown(this.value.toLowerCase());
});
document.getElementById('assignee-search').addEventListener('focus', function () {
  renderAssigneeDropdown(this.value.toLowerCase());
});
document.addEventListener('click', e => {
  if (!e.target.closest('.assignee-picker')) {
    document.querySelectorAll('.assignee-dropdown').forEach(d => d.classList.remove('open'));
  }
});

function renderAssigneeChips() {
  const el = document.getElementById('assignee-chips');
  const selected = allUsers.filter(u => selectedAssignees.has(u._id));
  el.innerHTML = selected.map(u => `
    <div class="assignee-chip">
      <span>${u.namaLengkap}</span>
      <button type="button" onclick="toggleAssignee('${u._id}')" title="Hapus"><i class="ti ti-x"></i></button>
    </div>`).join('');
}

function renderAssigneeDropdown(q = '') {
  const dd = document.getElementById('assignee-dropdown');
  const list = allUsers.filter(u => !selectedAssignees.has(u._id) && (!q || u.namaLengkap.toLowerCase().includes(q)));
  if (!list.length) {
    dd.innerHTML = `<div class="assignee-drop-empty">${q ? 'Tidak ada hasil' : 'Semua pengguna sudah dipilih'}</div>`;
  } else {
    dd.innerHTML = list.map(u => `
      <div class="assignee-drop-item" onclick="toggleAssignee('${u._id}')">
        <span>${u.namaLengkap}</span>
        <span style="font-size:11px;color:var(--text-3);margin-left:auto">${u.role}</span>
      </div>`).join('');
  }
  dd.classList.add('open');
}

function renderAssigneeGrid() { renderAssigneeChips(); }

function toggleAssignee(id) {
  selectedAssignees.has(id) ? selectedAssignees.delete(id) : selectedAssignees.add(id);
  renderAssigneeChips();
  const inp = document.getElementById('assignee-search');
  renderAssigneeDropdown(inp.value.toLowerCase());
}

let selectedCreators = new Set();
let selectedValidators = new Set();

async function loadUsers() {
  const data = await Users.selectable().catch(() => []);
  allUsers = (data || []).filter(u => u.statusAktif !== false);
  renderAssigneeGrid();
  renderCreatorGrid();
  renderValidatorGrid();
}

function renderCreatorChips() {
  const el = document.getElementById('creator-chips');
  if (!el) return;
  const selected = allUsers.filter(u => selectedCreators.has(u._id));
  el.innerHTML = selected.map(u => `
    <div class="assignee-chip">
      <span>${u.namaLengkap}</span>
      <button type="button" onclick="toggleCreator('${u._id}')" title="Hapus"><i class="ti ti-x"></i></button>
    </div>`).join('');
}
function renderCreatorDropdown(q = '') {
  const dd = document.getElementById('creator-dropdown');
  if (!dd) return;
  const list = allUsers.filter(u => u._id !== user._id && !selectedCreators.has(u._id) && (!q || u.namaLengkap.toLowerCase().includes(q)));
  dd.innerHTML = list.length
    ? list.map(u => `<div class="assignee-drop-item" onclick="toggleCreator('${u._id}')"><span>${u.namaLengkap}</span><span style="font-size:11px;color:var(--text-3);margin-left:auto">${u.role}</span></div>`).join('')
    : `<div class="assignee-drop-empty">${q ? 'Tidak ada hasil' : 'Semua pengguna sudah dipilih'}</div>`;
  dd.classList.add('open');
}
function renderCreatorGrid() { renderCreatorChips(); }
function toggleCreator(id) {
  selectedCreators.has(id) ? selectedCreators.delete(id) : selectedCreators.add(id);
  renderCreatorChips();
  renderCreatorDropdown(document.getElementById('creator-search').value.toLowerCase());
}

function renderValidatorChips() {
  const el = document.getElementById('validator-chips');
  if (!el) return;
  const selected = allUsers.filter(u => selectedValidators.has(u._id));
  el.innerHTML = selected.map(u => `
    <div class="assignee-chip">
      <span>${u.namaLengkap}</span>
      <button type="button" onclick="toggleValidator('${u._id}')" title="Hapus"><i class="ti ti-x"></i></button>
    </div>`).join('');
}
function renderValidatorDropdown(q = '') {
  const dd = document.getElementById('validator-dropdown');
  if (!dd) return;
  const directors = allUsers.filter(u => ['direksi','komisaris'].includes(u.role) && !selectedValidators.has(u._id) && (!q || u.namaLengkap.toLowerCase().includes(q)));
  dd.innerHTML = directors.length
    ? directors.map(u => `<div class="assignee-drop-item" onclick="toggleValidator('${u._id}')"><span>${u.namaLengkap}</span><span style="font-size:11px;color:var(--text-3);margin-left:auto">${u.role}</span></div>`).join('')
    : `<div class="assignee-drop-empty">${q ? 'Tidak ada hasil' : 'Semua direktur/komisaris sudah dipilih'}</div>`;
  dd.classList.add('open');
}
function renderValidatorGrid() { renderValidatorChips(); }
function toggleValidator(id) {
  selectedValidators.has(id) ? selectedValidators.delete(id) : selectedValidators.add(id);
  renderValidatorChips();
  renderValidatorDropdown(document.getElementById('validator-search').value.toLowerCase());
}

document.getElementById('creator-search').addEventListener('input', function () {
  renderCreatorDropdown(this.value.toLowerCase());
});
document.getElementById('creator-search').addEventListener('focus', function () {
  renderCreatorDropdown(this.value.toLowerCase());
});
document.getElementById('validator-search').addEventListener('input', function () {
  renderValidatorDropdown(this.value.toLowerCase());
});
document.getElementById('validator-search').addEventListener('focus', function () {
  renderValidatorDropdown(this.value.toLowerCase());
});

let allTemplates = [];
async function loadTemplates() {
  try {
    const { templates } = await TaskTemplates.list();
    allTemplates = templates;
    const sel = document.getElementById('tpl-picker');
    templates.forEach(t => {
      const o = document.createElement('option');
      o.value = t._id; o.textContent = t.nama;
      sel.appendChild(o);
    });
    sel.addEventListener('change', () => {
      document.getElementById('tpl-apply-btn').disabled = !sel.value;
    });
  } catch {}
}

function applyTemplate() {
  const id = document.getElementById('tpl-picker').value;
  if (!id) return;
  const tpl = allTemplates.find(t => t._id === id);
  if (!tpl) return;
  document.getElementById('f-judul').value     = tpl.nama;
  document.getElementById('char-count').textContent = tpl.nama.length;
  document.getElementById('f-deskripsi').value = tpl.deskripsi || '';
  document.getElementById('f-prioritas').value = tpl.prioritas || 'normal';
  if (tpl.durasiHari) {
    const d = new Date(); d.setDate(d.getDate() + tpl.durasiHari);
    document.getElementById('f-deadline').value = d.toISOString().slice(0, 10);
  }
  showToast(`Template "${tpl.nama}" diterapkan`);
}

// ── Subtask tree (create & edit) ──────────────────────────────────────────────
// Edit mode: subtasks punya _id (langsung sinkron ke API).
// Create mode: subtasks lokal pakai _tmp id; dikirim bersama payload saat submit.
const isLive = () => !!editId;
let tmpSeq = 1;
function sid(s) { return s._id || s._tmp; }

function childrenOf(parentId) {
  return subtasks.filter(s => (s.parentId || null) === (parentId || null))
    .sort((a,b) => (a.urutan||0) - (b.urutan||0));
}

let assignOpenId = null;   // id subtask yang panel assign-nya terbuka
let pendingAddParent;      // undefined = tidak ada; null = tambah top-level; id = tambah child
function nameOf(id) { const u = allUsers.find(x => x._id === id); return u ? u.namaLengkap : '?'; }

function renderSubtaskTree() {
  const root = document.getElementById('subtask-tree');
  const directors = allUsers.filter(u => ['direksi','komisaris'].includes(u.role));
  function detailPanel(s) {
    if (assignOpenId !== sid(s)) return '';
    const id = sid(s);
    const curA = (s.assignees || []).map(a => a._id || a);
    const curV = (s.validators || []).map(a => a._id || a);
    const aChips = allUsers.filter(u => curA.includes(u._id)).map(u =>
      `<div class="assignee-chip"><span>${u.namaLengkap}</span><button type="button" onclick="toggleSubAssignee('${id}','${u._id}',false)"><i class="ti ti-x"></i></button></div>`).join('');
    const vChips = allUsers.filter(u => curV.includes(u._id)).map(u =>
      `<div class="assignee-chip"><span>${u.namaLengkap}</span><button type="button" onclick="toggleSubValidator('${id}','${u._id}',false)"><i class="ti ti-x"></i></button></div>`).join('');
    const aOpts = allUsers.filter(u => !curA.includes(u._id)).map(u =>
      `<div class="assignee-drop-item" onclick="toggleSubAssignee('${id}','${u._id}',true)">${u.namaLengkap}<span style="font-size:11px;color:var(--text-3);margin-left:auto">${u.role}</span></div>`).join('') ||
      `<div class="assignee-drop-empty">Semua sudah dipilih</div>`;
    const vOpts = directors.filter(u => !curV.includes(u._id)).map(u =>
      `<div class="assignee-drop-item" onclick="toggleSubValidator('${id}','${u._id}',true)">${u.namaLengkap}</div>`).join('') ||
      `<div class="assignee-drop-empty">Semua direktur sudah dipilih</div>`;
    return `<div class="st-assign-panel" style="flex-direction:column;align-items:stretch">
      <label style="font-size:11px;font-weight:600;color:var(--text-2)">Deskripsi</label>
      <textarea class="st-judul" style="width:100%;resize:vertical" rows="2" placeholder="Deskripsi subtask..."
        onchange="updateSubField('${id}','deskripsi',this.value)">${(s.deskripsi||'').replace(/</g,'&lt;')}</textarea>
      <label style="font-size:11px;font-weight:600;color:var(--text-2);margin-top:6px">Deadline</label>
      <input type="date" class="st-judul" value="${s.dueDate ? String(s.dueDate).slice(0,10) : ''}" onchange="updateSubField('${id}','dueDate',this.value)">
      <label style="font-size:11px;font-weight:600;color:var(--text-2);margin-top:6px">Assignee</label>
      <div style="position:relative">
        <div class="assignee-chips" style="margin-bottom:6px">${aChips}</div>
        <input type="text" class="st-judul" placeholder="Cari assignee..." autocomplete="off"
          oninput="filterSubPanel(this,'sub-a-dd-${id}')"
          onfocus="document.getElementById('sub-a-dd-${id}').classList.add('open')"
          style="font-size:12px">
        <div class="assignee-dropdown" id="sub-a-dd-${id}" style="font-size:12px">${aOpts}</div>
      </div>
      <label style="font-size:11px;font-weight:600;color:var(--text-2);margin-top:8px">Task Approval (Direktur)</label>
      <div style="position:relative">
        <div class="assignee-chips" style="margin-bottom:6px">${vChips}</div>
        <input type="text" class="st-judul" placeholder="Cari direktur..." autocomplete="off"
          oninput="filterSubPanel(this,'sub-v-dd-${id}')"
          onfocus="document.getElementById('sub-v-dd-${id}').classList.add('open')"
          style="font-size:12px">
        <div class="assignee-dropdown" id="sub-v-dd-${id}" style="font-size:12px">${vOpts}</div>
      </div>
    </div>`;
  }
  function buildNodes(parentId, depth) {
    let html = childrenOf(parentId).map(s => {
      const id = sid(s);
      const names = (s.assignees || []).map(a => `<span class="st-chip">${a.namaLengkap || nameOf(a._id || a)}</span>`).join('');
      return `
        <div class="st-row" style="margin-left:${depth * 22}px">
          <i class="ti ti-corner-down-right st-mini" style="${depth ? '' : 'visibility:hidden'}"></i>
          <input class="st-judul" value="${(s.judul||'').replace(/"/g,'&quot;')}" onchange="updateSubtask('${id}', this.value)" placeholder="Judul subtask...">
          <div class="st-assignees">${names}</div>
          <button type="button" class="icon-btn${assignOpenId===id?' on':''}" title="Detail (assignee, approval, deadline)" onclick="toggleAssignPanel('${id}')"><i class="ti ti-adjustments"></i></button>
          <button type="button" class="icon-btn" title="Tambah sub" onclick="startAddSubtask('${id}')"><i class="ti ti-plus"></i></button>
          <button type="button" class="icon-btn" title="Hapus" onclick="deleteSubtask('${id}')"><i class="ti ti-trash"></i></button>
        </div>
        ${detailPanel(s)}
        ${buildNodes(id, depth + 1)}`;
    }).join('');
    // baris input tambah (inline, bukan prompt)
    if (pendingAddParent === (parentId || null) || (parentId === null && pendingAddParent === null)) {
      html += `
        <div class="st-row" style="margin-left:${depth * 22}px">
          <i class="ti ti-corner-down-right st-mini" style="${depth ? '' : 'visibility:hidden'}"></i>
          <input class="st-judul" id="st-new-input" placeholder="Ketik judul lalu Enter..."
            onkeydown="if(event.key==='Enter'){event.preventDefault();commitAddSubtask(this.value)} if(event.key==='Escape'){pendingAddParent=undefined;renderSubtaskTree()}">
          <button type="button" class="icon-btn" title="Simpan" onclick="commitAddSubtask(document.getElementById('st-new-input').value)"><i class="ti ti-check"></i></button>
          <button type="button" class="icon-btn" title="Batal" onclick="pendingAddParent=undefined;renderSubtaskTree()"><i class="ti ti-x"></i></button>
        </div>`;
    }
    return html;
  }
  root.innerHTML = buildNodes(null, 0) || '<div style="color:var(--text-3);font-size:13px">Belum ada subtask.</div>';
  const ni = document.getElementById('st-new-input'); if (ni) ni.focus();
}

function findSub(id) { return subtasks.find(s => sid(s) === id); }

function filterSubPanel(inp, ddId) {
  const q = inp.value.toLowerCase();
  const dd = document.getElementById(ddId);
  if (!dd) return;
  dd.classList.add('open');
  dd.querySelectorAll('.assignee-drop-item').forEach(el => {
    el.style.display = (!q || el.textContent.toLowerCase().includes(q)) ? '' : 'none';
  });
}

// Tampilkan input tambah subtask (top-level dari tombol di bawah, child dari +)
function startAddSubtask(parentId) { pendingAddParent = parentId || null; renderSubtaskTree(); }

async function commitAddSubtask(judul) {
  judul = (judul || '').trim();
  const parentId = pendingAddParent === undefined ? null : pendingAddParent;
  if (!judul) { pendingAddParent = undefined; renderSubtaskTree(); return; }
  let newId = null;
  if (isLive()) {
    try {
      const created = await Subtasks.create(editId, { judul, parentId: parentId || null });
      newId = created?._id || null;
      subtasks = await Subtasks.list(editId);
    } catch (e) { showToast(e.message, 'error'); }
  } else {
    const tmp = 't' + (tmpSeq++);
    subtasks.push({ _tmp: tmp, parentId: parentId || null, judul, assignees: [], validators: [], urutan: subtasks.length });
    newId = tmp;
  }
  pendingAddParent = undefined;     // (c) jangan munculkan baris subtask kosong otomatis
  if (newId) assignOpenId = newId;  // (b) langsung buka panel detail subtask baru
  renderSubtaskTree();
}

async function updateSubtask(id, judul) {
  const s = findSub(id); if (!s) return;
  s.judul = (judul || '').trim();
  if (isLive()) { try { await Subtasks.update(id, { judul: s.judul }); } catch (e) { showToast(e.message, 'error'); } }
}

async function deleteSubtask(id) {
  if (isLive()) {
    try { await Subtasks.delete(id); subtasks = await Subtasks.list(editId); }
    catch (e) { showToast(e.message, 'error'); }
  } else {
    const toRemove = new Set([id]); let changed = true;
    while (changed) {
      changed = false;
      for (const s of subtasks) {
        if (s.parentId && toRemove.has(s.parentId) && !toRemove.has(sid(s))) { toRemove.add(sid(s)); changed = true; }
      }
    }
    subtasks = subtasks.filter(s => !toRemove.has(sid(s)));
  }
  renderSubtaskTree();
}

function toggleAssignPanel(id) { assignOpenId = (assignOpenId === id) ? null : id; renderSubtaskTree(); }

async function toggleSubAssignee(id, userId, on) {
  const sub = findSub(id); if (!sub) return;
  let ids = (sub.assignees || []).map(a => a._id || a);
  ids = on ? [...new Set([...ids, userId])] : ids.filter(x => x !== userId);
  if (isLive()) {
    try { await Subtasks.update(id, { assignees: ids }); subtasks = await Subtasks.list(editId); }
    catch (e) { showToast(e.message, 'error'); }
  } else {
    sub.assignees = ids.map(x => ({ _id: x, namaLengkap: nameOf(x) }));
  }
  renderSubtaskTree();
}

async function toggleSubValidator(id, userId, on) {
  const sub = findSub(id); if (!sub) return;
  let ids = (sub.validators || []).map(a => a._id || a);
  ids = on ? [...new Set([...ids, userId])] : ids.filter(x => x !== userId);
  if (isLive()) {
    try { await Subtasks.update(id, { validators: ids }); subtasks = await Subtasks.list(editId); }
    catch (e) { showToast(e.message, 'error'); }
  } else {
    sub.validators = ids.map(x => ({ _id: x, namaLengkap: nameOf(x) }));
  }
  renderSubtaskTree();
}

async function updateSubField(id, field, value) {
  const sub = findSub(id); if (!sub) return;
  sub[field] = value || null;
  if (isLive()) { try { await Subtasks.update(id, { [field]: value || null }); } catch (e) { showToast(e.message, 'error'); } }
}

// Bangun struktur pohon untuk dikirim saat create
function buildSubtaskPayload(parentId) {
  return childrenOf(parentId).map(s => ({
    judul: s.judul,
    deskripsi: s.deskripsi || '',
    dueDate: s.dueDate || null,
    assignees: (s.assignees || []).map(a => a._id || a),
    validators: (s.validators || []).map(a => a._id || a),
    children: buildSubtaskPayload(sid(s)),
  }));
}

async function initForm() {
  loadTemplates();
  await loadUsers();

  // Subtask editor selalu tampil (saat buat & edit)
  document.getElementById('subtask-card').style.display = '';
  renderSubtaskTree();

  if (editId) {
    document.getElementById('bc-title').textContent     = 'Edit Task';
    document.getElementById('form-heading').textContent = 'Edit Task';
    document.getElementById('btn-label').textContent    = 'Simpan Perubahan';
    document.getElementById('template-picker-card').style.display = 'none';
    const { task } = await Tasks.get(editId);
    document.getElementById('f-judul').value     = task.judul;
    document.getElementById('char-count').textContent = task.judul.length;
    document.getElementById('f-deskripsi').value = task.deskripsi;
    document.getElementById('f-prioritas').value = task.prioritas;
    document.getElementById('f-deadline').value  = task.deadline?.split('T')[0] || '';
    (task.assignees || []).forEach(a => selectedAssignees.add(a._id || a));
    (task.creators  || []).forEach(a => selectedCreators.add(a._id || a));
    (task.validators|| []).forEach(a => selectedValidators.add(a._id || a));
    renderAssigneeGrid(); renderCreatorGrid(); renderValidatorGrid();

    // creators/validators hanya boleh diatur creator utama
    const mainCreatorId = task.dibuatOleh?._id || task.dibuatOleh;
    if (mainCreatorId !== user._id && user.role !== 'superadmin') {
      document.getElementById('creator-card').style.display = 'none';
      document.getElementById('validator-card').style.display = 'none';
    }

    // Muat subtask yang sudah ada
    subtasks = await Subtasks.list(editId);
    renderSubtaskTree();
  }
}

async function submitForm() {
  const judul    = document.getElementById('f-judul').value.trim();
  const deskripsi= document.getElementById('f-deskripsi').value.trim();
  const prioritas= document.getElementById('f-prioritas').value;
  const deadline = document.getElementById('f-deadline').value;
  const assignees= [...selectedAssignees];

  if (!judul)         { showToast('Judul task wajib diisi', 'error'); return; }
  if (!deskripsi)     { showToast('Deskripsi wajib diisi', 'error'); return; }
  if (!assignees.length) { showToast('Pilih minimal satu assignee', 'error'); return; }
  if (!deadline)      { showToast('Deadline wajib diisi', 'error'); return; }

  const btn = document.getElementById('btn-submit');
  btn.disabled = true;
  btn.innerHTML = '<i class="ti ti-loader-2" style="animation:spin .8s linear infinite"></i> Menyimpan...';

  try {
    const payload = { judul, deskripsi, prioritas, deadline, assignees,
      creators: [...selectedCreators], validators: [...selectedValidators] };
    if (editId) {
      await Tasks.update(editId, payload);
      showToast('Task berhasil diupdate');
      setTimeout(() => window.location.href = `/pages/task.html?id=${editId}`, 700);
    } else {
      payload.subtasks = buildSubtaskPayload(null); // sertakan subtask (nested) saat buat
      const { task } = await Tasks.create(payload);
      showToast('Task berhasil dibuat');
      setTimeout(() => window.location.href = `/pages/task.html?id=${task._id}`, 700);
    }
  } catch (e) {
    showToast(e.message, 'error');
    btn.disabled = false;
    btn.innerHTML = `<i class="ti ti-check"></i> <span>${editId ? 'Simpan Perubahan' : 'Simpan Task'}</span>`;
  }
}

initForm();
</script>
