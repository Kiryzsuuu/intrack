<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/img/logo.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intrack — Form Task</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="/styles/base.css">
  <style>
    .card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--r-lg);
      padding: 24px;
    }
    .card-title {
      font-size: 12px; font-weight: 700;
      color: var(--text-3); text-transform: uppercase;
      letter-spacing: .7px; margin-bottom: 20px;
      padding-bottom: 12px; border-bottom: 0.5px solid var(--border);
    }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 12px; font-weight: 600; color: var(--text-2); }
    .field input, .field textarea, .field select {
      background: var(--surface-2);
      border: 0.5px solid var(--border);
      border-radius: var(--r-sm);
      padding: 10px 13px;
      font-size: 14px; color: var(--text);
      outline: none; transition: var(--transition); width: 100%;
    }
    .field input:focus, .field textarea:focus, .field select:focus {
      border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); background: var(--surface);
    }
    .field input::placeholder, .field textarea::placeholder { color: var(--text-3); }
    .field textarea { resize: vertical; }
    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

    /* Assignees */
    .assignee-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 6px; }
    .assignee-item {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 12px; border: 0.5px solid var(--border);
      border-radius: var(--r-sm); cursor: pointer; transition: var(--transition);
      background: var(--surface-2); user-select: none;
    }
    .assignee-item:hover { border-color: var(--accent); background: var(--accent-light); }
    .assignee-item.selected { border-color: var(--accent); background: var(--accent-light); }
    .assignee-check {
      width: 16px; height: 16px; border-radius: 4px;
      border: 1.5px solid var(--border); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .assignee-item.selected .assignee-check { background: var(--accent); border-color: var(--accent); }
    .assignee-item.selected .assignee-check::after { content: '✓'; font-size: 10px; color: white; font-weight: 700; }

    /* Subtasks */
    .st-row { display:flex; align-items:center; gap:8px; padding:8px 0; border-bottom:0.5px dashed var(--border); }
    .st-row input.st-judul { flex:1; }
    .st-mini { font-size:11px; color:var(--text-3); }
    .st-assignees { display:flex; flex-wrap:wrap; gap:4px; }
    .st-chip { background:var(--accent-light); color:var(--accent); font-size:11px; padding:2px 8px; border-radius:100px; }
    .icon-btn { background:none; border:0.5px solid var(--border); border-radius:var(--r-sm); cursor:pointer; color:var(--text-2); padding:6px 8px; font-size:13px; }
    .icon-btn:hover { border-color:var(--accent); color:var(--accent); }

    @media(max-width:700px){ .row-2,.row-3{ grid-template-columns:1fr } }
    @keyframes spin { to { transform:rotate(360deg) } }
  </style>
</head>
<body>
<div class="app">
  <aside id="sidebar" class="sidebar" data-page="tasks"></aside>
  <div class="main">
    <div class="topbar">
      <div class="bc">
        <a href="/pages/list.html">Task</a>
        <span class="bc-sep">/</span>
        <span class="cur" id="bc-title">Buat Task Baru</span>
      </div>
      <div class="topbar-right">
        <a href="/pages/list.html" class="btn">Batal</a>
        <button class="btn btn-primary" id="btn-submit" onclick="submitForm()">
          <i class="ti ti-check"></i> <span id="btn-label">Simpan Task</span>
        </button>
      </div>
    </div>

    <div class="page-scroll">
      <div class="page-content">

        <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
          <div style="font-size:20px;font-weight:800;letter-spacing:-.4px" id="form-heading">Buat Task Baru</div>
        </div>

        <!-- Template Picker -->
        <div class="card" id="template-picker-card">
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
            <i class="ti ti-copy" style="font-size:16px;color:var(--accent)"></i>
            <span style="font-size:13px;font-weight:600">Mulai dari Template</span>
            <select id="tpl-picker" style="flex:1;min-width:200px;padding:8px 12px;border-radius:var(--r-sm);border:0.5px solid var(--border);background:var(--surface-2);color:var(--text);font-size:13px;outline:none">
              <option value="">— Pilih template (opsional) —</option>
            </select>
            <button class="btn btn-primary" onclick="applyTemplate()" style="font-size:12px" id="tpl-apply-btn" disabled><i class="ti ti-arrow-right"></i> Terapkan</button>
          </div>
        </div>

        <!-- Informasi Task -->
        <div class="card">
          <div class="card-title">Informasi Task</div>
          <div class="field" style="margin-bottom:16px">
            <label>Judul Task <span style="color:var(--red)">*</span></label>
            <input type="text" id="f-judul" placeholder="Masukkan judul task yang jelas dan spesifik..." maxlength="150">
            <div style="font-size:11px;color:var(--text-3);text-align:right"><span id="char-count">0</span>/150</div>
          </div>
          <div class="field">
            <label>Deskripsi <span style="color:var(--red)">*</span></label>
            <textarea id="f-deskripsi" rows="5" placeholder="Jelaskan detail pekerjaan, ruang lingkup, dan hasil yang diharapkan..."></textarea>
          </div>
        </div>

        <!-- Jadwal -->
        <div class="card">
          <div class="card-title">Prioritas & Jadwal</div>
          <div class="row-2">
            <div class="field">
              <label>Prioritas <span style="color:var(--red)">*</span></label>
              <select id="f-prioritas">
                <option value="normal">Normal</option>
                <option value="moderate">Moderate</option>
                <option value="urgent">Urgent</option>
              </select>
            </div>
            <div class="field">
              <label>Deadline <span style="color:var(--red)">*</span></label>
              <input type="date" id="f-deadline">
            </div>
          </div>
        </div>

        <!-- Assignees -->
        <div class="card">
          <div class="card-title">Assignee <span style="text-transform:none;font-weight:400;color:var(--text-3)">(bisa lebih dari satu)</span> <span style="color:var(--red)">*</span></div>
          <input type="text" id="assignee-search" placeholder="Cari nama..." style="margin-bottom:12px;background:var(--surface-2);border:0.5px solid var(--border);border-radius:var(--r-sm);padding:9px 12px;font-size:13px;color:var(--text);outline:none;width:100%">
          <div class="assignee-grid" id="assignee-grid">
            <div style="color:var(--text-3);font-size:13px;grid-column:1/-1">Memuat daftar pengguna...</div>
          </div>
        </div>

        <!-- Subtasks (hanya saat edit, req #11) -->
        <div class="card" id="subtask-card" style="display:none">
          <div class="card-title">Subtask <span style="text-transform:none;font-weight:400;color:var(--text-3)">(bisa bersarang & di-assign)</span></div>
          <div id="subtask-tree"></div>
          <button class="btn" style="margin-top:12px" onclick="addSubtask(null)"><i class="ti ti-plus"></i> Tambah Subtask</button>
        </div>

      </div>
    </div>
  </div>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/search.js"></script>
<script src="/js/sidebar.js"></script>
<script src="/js/webpush.js"></script>
<script>
if (!requireAuth()) throw 'redirect';
const user   = getUser();
const editId = new URLSearchParams(window.location.search).get('id');
let selectedAssignees = new Set();
let allUsers = [];
let subtasks = [];   // flat list dari API (saat edit)

document.getElementById('f-deadline').min = new Date().toISOString().split('T')[0];

document.getElementById('f-judul').addEventListener('input', function () {
  document.getElementById('char-count').textContent = this.value.length;
});

document.getElementById('assignee-search').addEventListener('input', function () {
  renderAssigneeGrid(this.value.toLowerCase());
});

function renderAssigneeGrid(q = '') {
  const grid = document.getElementById('assignee-grid');
  const list = allUsers.filter(u => !q || u.namaLengkap.toLowerCase().includes(q));
  if (!list.length) {
    grid.innerHTML = '<div style="color:var(--text-3);font-size:13px;grid-column:1/-1">Tidak ada pengguna</div>';
    return;
  }
  grid.innerHTML = list.map(m => `
    <div class="assignee-item${selectedAssignees.has(m._id) ? ' selected' : ''}" onclick="toggleAssignee('${m._id}')">
      <div class="assignee-check"></div>
      <span style="font-size:13px">${m.namaLengkap}</span>
    </div>`).join('');
}

function toggleAssignee(id) {
  selectedAssignees.has(id) ? selectedAssignees.delete(id) : selectedAssignees.add(id);
  renderAssigneeGrid(document.getElementById('assignee-search').value.toLowerCase());
}

async function loadUsers() {
  const data = await Users.selectable().catch(() => []);
  allUsers = (data || []).filter(u => u.statusAktif !== false);
  renderAssigneeGrid();
}

let allTemplates = [];
async function loadTemplates() {
  try {
    const { templates } = await TaskTemplates.list();
    allTemplates = templates;
    const sel = document.getElementById('tpl-picker');
    templates.forEach(t => {
      const o = document.createElement('option');
      o.value = t._id; o.textContent = t.nama;
      sel.appendChild(o);
    });
    sel.addEventListener('change', () => {
      document.getElementById('tpl-apply-btn').disabled = !sel.value;
    });
  } catch {}
}

function applyTemplate() {
  const id = document.getElementById('tpl-picker').value;
  if (!id) return;
  const tpl = allTemplates.find(t => t._id === id);
  if (!tpl) return;
  document.getElementById('f-judul').value     = tpl.nama;
  document.getElementById('char-count').textContent = tpl.nama.length;
  document.getElementById('f-deskripsi').value = tpl.deskripsi || '';
  document.getElementById('f-prioritas').value = tpl.prioritas || 'normal';
  if (tpl.durasiHari) {
    const d = new Date(); d.setDate(d.getDate() + tpl.durasiHari);
    document.getElementById('f-deadline').value = d.toISOString().slice(0, 10);
  }
  showToast(`Template "${tpl.nama}" diterapkan`);
}

// ── Subtask tree (edit mode) ──────────────────────────────────────────────────
function childrenOf(parentId) {
  return subtasks.filter(s => (s.parentId || null) === parentId).sort((a,b) => a.urutan - b.urutan);
}

function renderSubtaskTree() {
  const root = document.getElementById('subtask-tree');
  function nameOf(id) { const u = allUsers.find(x => x._id === id); return u ? u.namaLengkap : '?'; }
  function buildNodes(parentId, depth) {
    return childrenOf(parentId).map(s => {
      const names = (s.assignees || []).map(a => `<span class="st-chip">${a.namaLengkap || nameOf(a)}</span>`).join('');
      return `
        <div class="st-row" style="margin-left:${depth * 22}px">
          <i class="ti ti-corner-down-right st-mini" style="${depth ? '' : 'visibility:hidden'}"></i>
          <input class="st-judul" value="${(s.judul||'').replace(/"/g,'&quot;')}" onchange="updateSubtask('${s._id}', this.value)">
          <div class="st-assignees">${names}</div>
          <button class="icon-btn" title="Assign" onclick="assignSubtask('${s._id}')"><i class="ti ti-user-plus"></i></button>
          <button class="icon-btn" title="Tambah sub" onclick="addSubtask('${s._id}')"><i class="ti ti-plus"></i></button>
          <button class="icon-btn" title="Hapus" onclick="deleteSubtask('${s._id}')"><i class="ti ti-trash"></i></button>
        </div>
        ${buildNodes(s._id, depth + 1)}`;
    }).join('');
  }
  root.innerHTML = buildNodes(null, 0) || '<div style="color:var(--text-3);font-size:13px">Belum ada subtask.</div>';
}

async function addSubtask(parentId) {
  const judul = prompt('Judul subtask:');
  if (!judul || !judul.trim()) return;
  try {
    await Subtasks.create(editId, { judul: judul.trim(), parentId: parentId || null });
    subtasks = await Subtasks.list(editId);
    renderSubtaskTree();
  } catch (e) { showToast(e.message, 'error'); }
}

async function updateSubtask(id, judul) {
  try { await Subtasks.update(id, { judul: judul.trim() }); }
  catch (e) { showToast(e.message, 'error'); }
}

async function deleteSubtask(id) {
  if (!confirm('Hapus subtask ini beserta turunannya?')) return;
  try {
    await Subtasks.delete(id);
    subtasks = await Subtasks.list(editId);
    renderSubtaskTree();
  } catch (e) { showToast(e.message, 'error'); }
}

async function assignSubtask(id) {
  const sub = subtasks.find(s => s._id === id);
  const current = new Set((sub.assignees || []).map(a => a._id || a));
  const names = allUsers.map((u, i) => `${i+1}. ${u.namaLengkap}${current.has(u._id) ? ' ✓' : ''}`).join('\n');
  const pick = prompt(`Masukkan nomor assignee (pisahkan koma) untuk subtask:\n${names}`,
    allUsers.map((u,i) => current.has(u._id) ? i+1 : '').filter(Boolean).join(','));
  if (pick === null) return;
  const idxs = pick.split(',').map(x => parseInt(x.trim()) - 1).filter(i => i >= 0 && i < allUsers.length);
  const assignees = idxs.map(i => allUsers[i]._id);
  try {
    await Subtasks.update(id, { assignees });
    subtasks = await Subtasks.list(editId);
    renderSubtaskTree();
  } catch (e) { showToast(e.message, 'error'); }
}

async function initForm() {
  loadTemplates();
  await loadUsers();

  if (editId) {
    document.getElementById('bc-title').textContent     = 'Edit Task';
    document.getElementById('form-heading').textContent = 'Edit Task';
    document.getElementById('btn-label').textContent    = 'Simpan Perubahan';
    document.getElementById('template-picker-card').style.display = 'none';
    const { task } = await Tasks.get(editId);
    document.getElementById('f-judul').value     = task.judul;
    document.getElementById('char-count').textContent = task.judul.length;
    document.getElementById('f-deskripsi').value = task.deskripsi;
    document.getElementById('f-prioritas').value = task.prioritas;
    document.getElementById('f-deadline').value  = task.deadline?.split('T')[0] || '';
    (task.assignees || []).forEach(a => selectedAssignees.add(a._id || a));
    renderAssigneeGrid();

    // Subtask editor (req #11)
    document.getElementById('subtask-card').style.display = '';
    subtasks = await Subtasks.list(editId);
    renderSubtaskTree();
  }
}

async function submitForm() {
  const judul    = document.getElementById('f-judul').value.trim();
  const deskripsi= document.getElementById('f-deskripsi').value.trim();
  const prioritas= document.getElementById('f-prioritas').value;
  const deadline = document.getElementById('f-deadline').value;
  const assignees= [...selectedAssignees];

  if (!judul)         { showToast('Judul task wajib diisi', 'error'); return; }
  if (!deskripsi)     { showToast('Deskripsi wajib diisi', 'error'); return; }
  if (!assignees.length) { showToast('Pilih minimal satu assignee', 'error'); return; }
  if (!deadline)      { showToast('Deadline wajib diisi', 'error'); return; }

  const btn = document.getElementById('btn-submit');
  btn.disabled = true;
  btn.innerHTML = '<i class="ti ti-loader-2" style="animation:spin .8s linear infinite"></i> Menyimpan...';

  try {
    const payload = { judul, deskripsi, prioritas, deadline, assignees };
    if (editId) {
      await Tasks.update(editId, payload);
      showToast('Task berhasil diupdate');
      setTimeout(() => window.location.href = `/pages/task.html?id=${editId}`, 700);
    } else {
      const { task } = await Tasks.create(payload);
      showToast('Task berhasil dibuat');
      setTimeout(() => window.location.href = `/pages/task.html?id=${task._id}`, 700);
    }
  } catch (e) {
    showToast(e.message, 'error');
    btn.disabled = false;
    btn.innerHTML = `<i class="ti ti-check"></i> <span>${editId ? 'Simpan Perubahan' : 'Simpan Task'}</span>`;
  }
}

initForm();
</script>
</body>
</html>
