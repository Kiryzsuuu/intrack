<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/img/logo.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intrack — Channel</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="/styles/base.css">
  <style>
    /* ── Layout ── */
    .ch-layout {
      display: flex; height: calc(100vh - 56px); overflow: hidden;
      background: var(--bg);
    }

    /* ── Channel list panel (Discord-style dark sidebar) ── */
    .ch-list-panel {
      width: 240px; flex-shrink: 0;
      display: flex; flex-direction: column;
      background: var(--surface-2);
      border-right: 0.5px solid var(--border);
    }
    .ch-list-head {
      padding: 0 12px;
      height: 48px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 0.5px solid var(--border);
      font-size: 13px; font-weight: 700; color: var(--text);
    }
    .ch-list-head-btn {
      width: 28px; height: 28px; border-radius: 6px; border: none; cursor: pointer;
      background: none; color: var(--text-3); display: flex; align-items: center;
      justify-content: center; font-size: 16px; transition: var(--transition);
    }
    .ch-list-head-btn:hover { background: var(--border); color: var(--text); }

    .ch-section-label {
      padding: 16px 12px 4px;
      font-size: 10px; font-weight: 700; color: var(--text-3);
      text-transform: uppercase; letter-spacing: .8px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .ch-section-add {
      width: 18px; height: 18px; border-radius: 4px; border: none; cursor: pointer;
      background: none; color: var(--text-3); font-size: 14px; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      transition: var(--transition);
    }
    .ch-section-add:hover { color: var(--text); background: var(--border); }

    .ch-items { flex: 1; overflow-y: auto; padding: 0 6px 8px; }
    .ch-item {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 8px; border-radius: 6px;
      cursor: pointer; transition: background .1s;
      margin-bottom: 1px; color: var(--text-3);
      position: relative;
    }
    .ch-item:hover { background: var(--border); color: var(--text); }
    .ch-item.active { background: var(--accent-dim); color: var(--accent); }
    .ch-item-hash { font-size: 18px; font-weight: 300; flex-shrink: 0; line-height: 1; width: 20px; text-align: center; }
    .ch-item-name { font-size: 13px; font-weight: 500; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ch-item-actions { display: none; gap: 2px; }
    .ch-item:hover .ch-item-actions { display: flex; }
    .ch-item-btn { width: 20px; height: 20px; border: none; background: none; cursor: pointer; color: var(--text-3); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 12px; }
    .ch-item-btn:hover { color: var(--text); background: var(--border); }
    .ch-item-btn.danger:hover { color: var(--red-text); }

    /* Voice channel items */
    .ch-voice-item {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 8px; border-radius: 6px;
      cursor: pointer; transition: background .1s;
      margin-bottom: 1px; color: var(--text-3);
    }
    .ch-voice-item:hover { background: var(--border); color: var(--text); }
    .ch-voice-item.in-voice { color: #3BA55C; }
    .ch-voice-participants-list { padding: 0 8px 4px 34px; display: flex; flex-direction: column; gap: 3px; }
    .ch-vp-row { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-3); }
    .ch-vp-av { width: 18px; height: 18px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 700; color: #fff; overflow: hidden; flex-shrink: 0; }
    .ch-vp-av img { width: 100%; height: 100%; object-fit: cover; }

    /* Voice status bar (bottom of left panel, like Discord) */
    .ch-voice-bar {
      border-top: 0.5px solid var(--border);
      background: var(--surface-2);
      padding: 8px 10px;
      display: none; flex-direction: column; gap: 6px;
    }
    .ch-voice-bar.active { display: flex; }
    .ch-voice-bar-top { display: flex; align-items: center; gap: 7px; }
    .ch-voice-bar-info { flex: 1; min-width: 0; }
    .ch-voice-bar-status { font-size: 11px; font-weight: 600; color: #3BA55C; display: flex; align-items: center; gap: 3px; }
    .ch-voice-bar-name { font-size: 11px; color: var(--text-3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ch-voice-bar-btns { display: flex; gap: 4px; justify-content: space-around; }
    .vc-mini-btn {
      flex: 1; height: 28px; border-radius: 6px; border: none; cursor: pointer;
      background: none; color: var(--text-3); font-size: 14px;
      display: flex; align-items: center; justify-content: center; transition: var(--transition);
    }
    .vc-mini-btn:hover { background: var(--border); color: var(--text); }
    .vc-mini-btn.off { color: #EF4444; }

    /* ── Main chat area ── */
    .ch-main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--surface); }

    .ch-topbar {
      height: 48px; padding: 0 16px;
      border-bottom: 0.5px solid var(--border);
      display: flex; align-items: center; gap: 10px;
      background: var(--surface); flex-shrink: 0;
      box-shadow: 0 1px 0 var(--border);
    }
    .ch-topbar-hash { font-size: 22px; color: var(--text-3); font-weight: 300; }
    .ch-topbar-name { font-size: 15px; font-weight: 700; color: var(--text); }
    .ch-topbar-sep { color: var(--border); font-size: 18px; }
    .ch-topbar-desc { font-size: 12px; color: var(--text-3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ch-topbar-actions { margin-left: auto; display: flex; gap: 6px; align-items: center; }

    /* Voice participants bar (inside chat, below topbar) */
    .voice-panel {
      background: rgba(59,165,92,.08); border-bottom: 0.5px solid rgba(59,165,92,.2);
      padding: 8px 16px; display: none; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .voice-panel.active { display: flex; }
    .voice-panel-label { font-size: 11px; font-weight: 700; color: #3BA55C; display: flex; align-items: center; gap: 5px; }
    .voice-participants { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }
    .voice-participant {
      display: flex; align-items: center; gap: 5px; padding: 3px 8px;
      background: rgba(59,165,92,.1); border: 0.5px solid rgba(59,165,92,.25);
      border-radius: 100px; font-size: 12px; color: var(--text-2);
    }
    .voice-participant .vp-av {
      width: 18px; height: 18px; border-radius: 50%; background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 8px; font-weight: 700; color: #fff; overflow: hidden; flex-shrink: 0;
    }
    .voice-participant .vp-av img { width: 100%; height: 100%; object-fit: cover; }
    .voice-participant .vp-icons { display: flex; gap: 2px; color: var(--text-3); font-size: 11px; }
    .voice-participant.muted .vp-icons .ic-mic { color: #EF4444; }

    /* Messages area */
    .ch-messages {
      flex: 1; overflow-y: auto; padding: 16px 16px 8px;
      display: flex; flex-direction: column; gap: 0;
      background: var(--surface);
    }
    .ch-empty {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 8px; color: var(--text-3); text-align: center;
    }
    .ch-empty-icon {
      width: 72px; height: 72px; border-radius: 50%;
      background: var(--accent-dim); display: flex; align-items: center;
      justify-content: center; font-size: 32px; color: var(--accent); margin-bottom: 8px;
    }
    .ch-empty h3 { font-size: 22px; font-weight: 800; color: var(--text); margin-bottom: 4px; }
    .ch-empty p { font-size: 13px; max-width: 340px; line-height: 1.6; }

    .date-divider {
      display: flex; align-items: center; gap: 10px; margin: 20px 0 12px;
      color: var(--text-3); font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .5px; flex-shrink: 0;
    }
    .date-divider::before, .date-divider::after { content: ''; flex: 1; height: 0.5px; background: var(--border); }

    .msg-row {
      display: flex; gap: 14px; align-items: flex-start;
      padding: 2px 8px; border-radius: 6px; margin-bottom: 0;
      transition: background .08s;
    }
    .msg-row:hover { background: var(--surface-2); }
    .msg-row:hover .msg-actions { opacity: 1; }
    .msg-row.msg-continue { padding-top: 1px; padding-bottom: 1px; }

    .msg-av {
      width: 38px; height: 38px; border-radius: 50%; background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; color: #fff; flex-shrink: 0; overflow: hidden;
      margin-top: 2px;
    }
    .msg-av img { width: 100%; height: 100%; object-fit: cover; }
    .msg-av-spacer { width: 38px; flex-shrink: 0; }
    .msg-content { flex: 1; min-width: 0; }
    .msg-meta { display: flex; align-items: baseline; gap: 8px; margin-bottom: 3px; }
    .msg-name { font-size: 14px; font-weight: 700; color: var(--text); }
    .msg-time { font-size: 11px; color: var(--text-3); }
    .msg-text { font-size: 14px; color: var(--text-2); line-height: 1.55; word-break: break-word; }
    .msg-actions {
      opacity: 0; transition: opacity .1s; margin-left: auto; flex-shrink: 0;
      display: flex; gap: 2px; background: var(--surface); border: 0.5px solid var(--border);
      border-radius: 6px; padding: 2px; position: relative; top: -2px;
    }
    .msg-del-btn {
      background: none; border: none; cursor: pointer; color: var(--text-3);
      font-size: 15px; padding: 4px 6px; border-radius: 4px; transition: var(--transition);
    }
    .msg-del-btn:hover { color: #EF4444; background: rgba(239,68,68,.1); }

    /* Input */
    .ch-input-wrap { padding: 0 16px 16px; background: var(--surface); flex-shrink: 0; }
    .ch-input-box {
      display: flex; gap: 10px; align-items: flex-end;
      background: var(--surface-2); border: 0.5px solid var(--border);
      border-radius: 10px; padding: 10px 14px;
      transition: border-color .15s;
    }
    .ch-input-box:focus-within { border-color: var(--accent); }
    .ch-input-box textarea {
      flex: 1; background: none; border: none; outline: none; resize: none;
      font-size: 14px; color: var(--text); font-family: inherit; line-height: 1.5;
      max-height: 150px; overflow-y: auto;
    }
    .ch-input-box textarea::placeholder { color: var(--text-3); }
    .ch-send-btn {
      background: var(--accent); border: none; border-radius: 8px; color: #fff;
      width: 34px; height: 34px; cursor: pointer; display: flex; align-items: center;
      justify-content: center; font-size: 16px; flex-shrink: 0; transition: var(--transition);
    }
    .ch-send-btn:hover { background: var(--accent-hover); }
    .ch-send-btn:disabled { opacity: .4; cursor: default; }

    /* Placeholder */
    .ch-placeholder {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 12px; color: var(--text-3); background: var(--surface);
    }
    .ch-placeholder-icon {
      width: 80px; height: 80px; border-radius: 50%; background: var(--surface-2);
      display: flex; align-items: center; justify-content: center;
      font-size: 36px; color: var(--text-3);
    }
    .ch-placeholder h3 { font-size: 18px; font-weight: 700; color: var(--text); margin: 0; }
    .ch-placeholder p { font-size: 13px; margin: 0; }

    /* Modal */
    .modal-backdrop { position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px); }
    .modal-box { background:var(--surface);border-radius:var(--r-lg);padding:24px;width:440px;max-width:94vw;display:flex;flex-direction:column;gap:16px;box-shadow:var(--shadow-lg); }
    .modal-title { font-size:17px;font-weight:800;color:var(--text);margin:0; }
    .modal-sub { font-size:12px;color:var(--text-3);margin-top:-8px; }
    .field { display:flex;flex-direction:column;gap:6px; }
    .field label { font-size:12px;font-weight:600;color:var(--text-2); }
    .field input,.field textarea {
      background:var(--surface-2);border:0.5px solid var(--border);
      border-radius:var(--r-sm);padding:10px 12px;font-size:14px;color:var(--text);
      outline:none;width:100%;font-family:inherit;transition:border-color .15s;
    }
    .field input:focus,.field textarea:focus { border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim); }
    .toggle-row { display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--surface-2);border-radius:var(--r-sm);cursor:pointer; }
    .toggle-row input[type=checkbox] { width:16px;height:16px;accent-color:var(--accent);margin-top:1px;flex-shrink:0; }

    /* Video grid */
    #video-grid {
      position: fixed; inset: 56px 0 0 var(--sidebar-w); z-index: 800;
      background: #111; display: none; flex-wrap: wrap; align-content: flex-start;
      padding: 8px; gap: 8px; overflow-y: auto;
    }
    #video-grid.active { display: flex; }
    .video-tile {
      background: #1e1e1e; border-radius: 12px; overflow: hidden;
      position: relative; display: flex; align-items: center; justify-content: center;
      min-height: 200px; flex: 1 1 300px;
    }
    .video-tile video { width: 100%; height: 100%; object-fit: cover; display: block; }
    .video-tile .vt-name {
      position: absolute; bottom: 8px; left: 10px;
      background: rgba(0,0,0,.6); color: #fff; font-size: 12px; font-weight: 600;
      padding: 3px 10px; border-radius: 100px; backdrop-filter: blur(4px);
    }
    .video-tile .vt-muted {
      position: absolute; top: 8px; right: 8px;
      background: rgba(239,68,68,.85); color: #fff; border-radius: 50%;
      width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; font-size: 13px;
    }
    .video-tile .vt-no-video {
      width: 70px; height: 70px; border-radius: 50%; background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; font-weight: 800; color: #fff;
    }

    @media(max-width:640px) {
      .ch-list-panel { width: 180px; }
      #video-grid { inset: 56px 0 0 0; }
    }
  </style>
</head>
<body>
<div class="app">
  <aside id="sidebar" class="sidebar" data-page="channel"></aside>
  <div class="main" style="padding:0;overflow:hidden">

    <div class="ch-layout">

      <!-- ── Panel kiri ── -->
      <div class="ch-list-panel">
        <div class="ch-list-head">
          <span>Channel</span>
          <button class="ch-list-head-btn" title="Buat Channel Baru" onclick="openCreateModal()">
            <i class="ti ti-plus"></i>
          </button>
        </div>

        <div class="ch-items">
          <!-- Text channels -->
          <div class="ch-section-label">
            <span>Text</span>
            <button class="ch-section-add" title="Buat channel" onclick="openCreateModal()"><i class="ti ti-plus"></i></button>
          </div>
          <div id="channel-list">
            <div style="padding:12px 8px;color:var(--text-3);font-size:12px">Memuat...</div>
          </div>

          <!-- Voice channels -->
          <div class="ch-section-label" style="margin-top:8px">
            <span>Voice</span>
            <button class="ch-section-add" title="Gabung voice" onclick="joinVoice()"><i class="ti ti-phone"></i></button>
          </div>
          <div id="voice-ch-item" class="ch-voice-item" onclick="joinVoice()">
            <i class="ti ti-volume" style="font-size:18px;width:20px;text-align:center"></i>
            <span style="font-size:13px;font-weight:500">General Voice</span>
          </div>
          <div id="voice-ch-participants" class="ch-voice-participants-list"></div>
        </div>

        <!-- Voice status bar — muncul saat sedang di voice (seperti Discord) -->
        <div class="ch-voice-bar" id="ch-voice-bar">
          <div class="ch-voice-bar-top">
            <div style="width:28px;height:28px;border-radius:50%;background:#3BA55C;display:flex;align-items:center;justify-content:center;flex-shrink:0">
              <i class="ti ti-phone" style="color:#fff;font-size:13px"></i>
            </div>
            <div class="ch-voice-bar-info">
              <div class="ch-voice-bar-status"><i class="ti ti-circle-filled" style="font-size:7px"></i>Terhubung</div>
              <div class="ch-voice-bar-name" id="voice-bar-ch-name">General Voice</div>
            </div>
          </div>
          <div class="ch-voice-bar-btns">
            <button class="vc-mini-btn" id="vc-mute" onclick="toggleMute()" title="Mute/Unmute">
              <i class="ti ti-microphone"></i>
            </button>
            <button class="vc-mini-btn" id="vc-deafen" onclick="toggleDeafen()" title="Deafen">
              <i class="ti ti-headphones"></i>
            </button>
            <button class="vc-mini-btn" id="vc-video" onclick="toggleVideo()" title="Kamera On/Off">
              <i class="ti ti-video-off"></i>
            </button>
            <button class="vc-mini-btn" onclick="leaveVoice()" title="Putuskan voice" style="color:#EF4444;background:rgba(239,68,68,0.15)">
              <i class="ti ti-phone-off"></i>
            </button>
          </div>
        </div>
      </div>

      <!-- ── Area chat utama ── -->
      <div class="ch-main" id="ch-main">
        <div class="ch-placeholder">
          <div class="ch-placeholder-icon"><i class="ti ti-messages"></i></div>
          <h3>Selamat datang!</h3>
          <p>Pilih channel di sebelah kiri untuk mulai chat, atau buat channel baru.</p>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Video Grid Overlay -->
<div id="video-grid"></div>

<!-- Modal Buat Channel -->
<div id="modal-create" class="modal-backdrop" style="display:none" onclick="if(event.target===this)closeCreateModal()">
  <div class="modal-box">
    <h3 class="modal-title">Buat Channel Baru</h3>
    <div class="field">
      <label>Nama Channel *</label>
      <input type="text" id="new-ch-name" placeholder="contoh: general, marketing..." maxlength="80">
    </div>
    <div class="field">
      <label>Deskripsi</label>
      <textarea id="new-ch-desc" rows="2" placeholder="Deskripsi singkat channel..." maxlength="300" style="resize:none"></textarea>
    </div>
    <div class="toggle-row">
      <input type="checkbox" id="new-ch-private">
      <label for="new-ch-private" style="font-size:13px;cursor:pointer">
        <i class="ti ti-lock" style="font-size:12px;margin-right:4px"></i>Channel Privat
        <span style="color:var(--text-3);font-size:11px;display:block">Hanya member yang diundang bisa masuk</span>
      </label>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn" onclick="closeCreateModal()">Batal</button>
      <button class="btn btn-primary" onclick="createChannel()"><i class="ti ti-plus"></i> Buat</button>
    </div>
  </div>
</div>

<!-- Modal Edit Channel -->
<div id="modal-edit" class="modal-backdrop" style="display:none" onclick="if(event.target===this)closeEditModal()">
  <div class="modal-box">
    <h3 class="modal-title">Edit Channel</h3>
    <input type="hidden" id="edit-ch-id">
    <div class="field">
      <label>Nama Channel *</label>
      <input type="text" id="edit-ch-name" maxlength="80">
    </div>
    <div class="field">
      <label>Deskripsi</label>
      <textarea id="edit-ch-desc" rows="2" maxlength="300" style="resize:none"></textarea>
    </div>
    <div class="toggle-row">
      <input type="checkbox" id="edit-ch-private">
      <label for="edit-ch-private" style="font-size:13px;cursor:pointer">
        <i class="ti ti-lock" style="font-size:12px;margin-right:4px"></i>Channel Privat
      </label>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn" onclick="closeEditModal()">Batal</button>
      <button class="btn btn-primary" onclick="saveEditChannel()"><i class="ti ti-check"></i> Simpan</button>
    </div>
  </div>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/search.js"></script>
<script src="/js/sidebar.js"></script>
<script src="/js/webpush.js"></script>
<script src="/js/dialogs.js"></script>
<script>
if (!requireAuth()) throw 'redirect';
const me = getUser();

let activeChannelId = null;
let channels        = [];
let msgBefore       = null;
let loadingMore     = false;

// ── Load list channel ──────────────────────────────────────────────────────────
async function loadChannels() {
  try {
    channels = await Channels.list();
    renderChannelList();
    // Auto-open dari URL
    const params = new URLSearchParams(location.search);
    if (params.get('id')) openChannel(params.get('id'));
  } catch (e) {
    document.getElementById('channel-list').innerHTML =
      `<div style="padding:16px;color:var(--red-text);font-size:13px">${e.message}</div>`;
  }
}

function renderChannelList() {
  const el = document.getElementById('channel-list');
  if (!channels.length) {
    el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-3);font-size:13px">Belum ada channel.<br>Buat yang pertama!</div>';
    return;
  }
  el.innerHTML = channels.map(ch => `
    <div class="ch-item${ch._id === activeChannelId ? ' active' : ''}" onclick="openChannel('${ch._id}')" id="chitem-${ch._id}">
      <div class="ch-item-icon"><i class="ti ${ch.isPrivate ? 'ti-lock' : 'ti-hash'}"></i></div>
      <div style="flex:1;min-width:0">
        <div class="ch-item-name">${escHtml(ch.nama)}</div>
        ${ch.isPrivate ? '<div class="ch-item-priv">Privat</div>' : ''}
      </div>
    </div>`).join('');
}

// ── Buka channel ───────────────────────────────────────────────────────────────
async function openChannel(id) {
  // Tinggalkan voice dan channel room lama
  if (inVoice && activeChannelId && activeChannelId !== id) leaveVoice();
  if (activeChannelId && activeChannelId !== id) {
    const s = getSocket();
    s.emit('ch:leave', { channelId: activeChannelId });
  }

  activeChannelId = id;

  document.querySelectorAll('.ch-item').forEach(el => el.classList.remove('active'));

    const actions = document.getElementById('ch-topbar-actions');

    if (inVoice) {

// ── Load pesan ─────────────────────────────────────────────────────────────────
async function loadMessages(id, prepend = false) {
  if (loadingMore) return;
  loadingMore = true;
  const el = document.getElementById('ch-messages');
  try {
    const params = { limit: 50 };
    if (msgBefore) params.before = msgBefore;

    const msgs = await Channels.messages(id, params);
    if (!msgs.length && !prepend) {
      el.innerHTML = '<div class="ch-empty">Belum ada pesan. Mulailah percakapan!</div>';
      loadingMore = false;
      return;
    }

    if (prepend) {
      const prevScroll = el.scrollHeight - el.scrollTop;
      const html = renderMessages(msgs);
      el.insertAdjacentHTML('afterbegin', html);
      el.scrollTop = el.scrollHeight - prevScroll;
    } else {
      el.innerHTML = renderMessages(msgs);
      el.scrollTop = el.scrollHeight;
    }

    if (msgs.length === 50) {
      msgBefore = msgs[0].createdAt;
      if (!prepend) addLoadMoreBtn();
    }
  } catch(e) {
    if (!prepend) el.innerHTML = `<div style="color:var(--red-text);font-size:13px">${e.message}</div>`;
  }
  loadingMore = false;
}

function addLoadMoreBtn() {
  const el = document.getElementById('ch-messages');
  const btn = document.createElement('div');
  btn.id = 'load-more-btn';
  btn.style.cssText = 'text-align:center;padding:8px';
  btn.innerHTML = `<button class="btn" style="font-size:12px" onclick="loadMoreMessages()">
    <i class="ti ti-arrow-up"></i> Muat pesan lebih lama
  </button>`;
  el.insertBefore(btn, el.firstChild);
}

async function loadMoreMessages() {
  const btn = document.getElementById('load-more-btn');
  if (btn) btn.remove();
  await loadMessages(activeChannelId, true);
}

function renderMessages(msgs) {
  if (!msgs.length) return '';
  let html = '';
  let lastDate = '';
  let lastUserId = '';

  msgs.forEach(m => {
    const d = new Date(m.createdAt);
    const dateStr = d.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
    if (dateStr !== lastDate) {
      html += `<div class="date-divider">${dateStr}</div>`;
      lastDate = dateStr;
      lastUserId = '';
    }

    const u    = m.userId || {};
    const uid  = u._id || '';
    const name = u.namaLengkap || 'Unknown';
    const time = d.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
    const inits = name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
    const avColors = ['#5B4FE8','#16A34A','#EA580C','#0D9488','#DB2777'];
    const avColor  = avColors[inits.charCodeAt(0) % avColors.length];
    const avHtml   = u.fotoProfil
      ? `<img src="${u.fotoProfil}" alt="">`
      : `<span style="font-size:12px;font-weight:700;color:#fff">${inits}</span>`;

    const isOwner = uid === me._id || uid?.toString() === me._id;
    const showHeader = uid !== lastUserId;
    lastUserId = uid;

    html += `
      <div class="msg-row" id="msg-${m._id}">
        <div class="msg-av" style="background:${avColor};visibility:${showHeader ? 'visible' : 'hidden'}">${avHtml}</div>
        <div class="msg-content">
          ${showHeader ? `<div class="msg-meta"><span class="msg-name">${escHtml(name)}</span><span class="msg-time">${time}</span></div>` : ''}
          <div class="msg-text">${escHtml(m.isi).replace(/\n/g, '<br>')}</div>
        </div>
        ${isOwner ? `
          <div class="msg-actions">
            <button class="msg-del-btn" title="Hapus" onclick="deleteMessage('${m._id}')"><i class="ti ti-trash"></i></button>
          </div>` : ''}
      </div>`;
  });
  return html;
}

// ── Kirim pesan ────────────────────────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('ch-msg-input');
  const isi   = input.value.trim();
  if (!isi || !activeChannelId) return;

  input.value = '';
  input.style.height = '';
  document.getElementById('ch-send-btn').disabled = true;

  try {
    const msg = await Channels.sendMessage(activeChannelId, isi);
    const el  = document.getElementById('ch-messages');
    const empty = el.querySelector('.ch-empty');
    if (empty) empty.remove();

    const u    = msg.userId || {};
    const name = u.namaLengkap || 'Unknown';
    const time = new Date(msg.createdAt).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
    const inits = name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
    const avColors = ['#5B4FE8','#16A34A','#EA580C','#0D9488','#DB2777'];
    const avColor  = avColors[inits.charCodeAt(0) % avColors.length];
    const avHtml   = u.fotoProfil ? `<img src="${u.fotoProfil}" alt="">` : `<span style="font-size:12px;font-weight:700;color:#fff">${inits}</span>`;

    el.insertAdjacentHTML('beforeend', `
      <div class="msg-row" id="msg-${msg._id}">
        <div class="msg-av" style="background:${avColor}">${avHtml}</div>
        <div class="msg-content">
          <div class="msg-meta"><span class="msg-name">${escHtml(name)}</span><span class="msg-time">${time}</span></div>
          <div class="msg-text">${escHtml(msg.isi).replace(/\n/g, '<br>')}</div>
        </div>
        <div class="msg-actions">
          <button class="msg-del-btn" title="Hapus" onclick="deleteMessage('${msg._id}')"><i class="ti ti-trash"></i></button>
        </div>
      </div>`);
    el.scrollTop = el.scrollHeight;
  } catch (e) { showToast(e.message, 'error'); }

  document.getElementById('ch-send-btn').disabled = false;
  input.focus();
}

function onMsgKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
function autoResize(el) {
  el.style.height = '';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ── Socket.io + WebRTC Voice ───────────────────────────────────────────────────
let socket       = null;
let peerConns    = {};   // { socketId: RTCPeerConnection }
let localStream  = null;
let isMuted      = false;
let isDeafened   = false;
let isVideoOn    = false;
let inVoice      = false;
let voiceParticipants = {}; // { userId: { name, photo, socketId, muted, deafened, videoOn } }

function getSocket() {
  if (socket && socket.connected) return socket;
  const token = localStorage.getItem('wt_token');
  const _u = getUser();
  socket = io({ auth: { token, photo: _u?.fotoProfil || null } });

  socket.on('voice:participants', async (list) => {
    voiceParticipants = {};
    list.forEach(p => { voiceParticipants[p.userId] = p; });
    renderVoiceParticipants();
    // Pastikan localStream sudah siap sebelum buat offer
    if (!localStream) return;
    for (const p of list) {
      if (p.userId !== me._id) await createOffer(p.socketId);
    }
  });

  socket.on('voice:user-joined', (p) => {
    voiceParticipants[p.userId] = p;
    renderVoiceParticipants();
    createOffer(p.socketId);
  });

  socket.on('voice:user-left', ({ userId, socketId }) => {
    delete voiceParticipants[userId];
    closePeer(socketId);
    renderVoiceParticipants();
    removeVideoTile(socketId);
  });

  socket.on('voice:user-status', ({ userId, muted, deafened, videoOn }) => {
    if (voiceParticipants[userId]) {
      Object.assign(voiceParticipants[userId], { muted, deafened, videoOn });
      renderVoiceParticipants();
    }
  });

  socket.on('voice:offer', async ({ fromSocketId, fromUserId, offer }) => {
    const pc = getOrCreatePeer(fromSocketId, fromUserId);
    await pc.setRemoteDescription(offer);
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    socket.emit('voice:answer', { targetSocketId: fromSocketId, answer });
  });

  socket.on('voice:answer', async ({ fromSocketId, answer }) => {
    const pc = peerConns[fromSocketId];
    if (pc) await pc.setRemoteDescription(answer);
  });

  socket.on('voice:ice', async ({ fromSocketId, candidate }) => {
    const pc = peerConns[fromSocketId];
    if (pc && candidate) await pc.addIceCandidate(candidate);
  });

  // ── Real-time channel messages ────────────────────────────────────────────
  socket.on('channel:message', (msg) => {
    if (msg.channelId !== activeChannelId) return;
    // Skip jika pesan dari diri sendiri (sudah dirender saat send)
    const uid = msg.userId?._id || msg.userId;
    if (uid === me._id || uid?.toString() === me._id) return;

    const el = document.getElementById('ch-messages');
    if (!el) return;
    const empty = el.querySelector('.ch-empty');
    if (empty) empty.remove();

    const u    = msg.userId || {};
    const name = u.namaLengkap || 'Unknown';
    const time = new Date(msg.createdAt).toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit' });
    const inits = name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
    const avColors = ['#5B4FE8','#16A34A','#EA580C','#0D9488','#DB2777'];
    const avColor  = avColors[inits.charCodeAt(0) % avColors.length];
    const avHtml   = u.fotoProfil
      ? `<img src="${u.fotoProfil}" alt="">`
      : `<span style="font-size:12px;font-weight:700;color:#fff">${inits}</span>`;

    el.insertAdjacentHTML('beforeend', `
      <div class="msg-row" id="msg-${msg._id}">
        <div class="msg-av" style="background:${avColor}">${avHtml}</div>
        <div class="msg-content">
          <div class="msg-meta"><span class="msg-name">${escHtml(name)}</span><span class="msg-time">${time}</span></div>
          <div class="msg-text">${escHtml(msg.isi).replace(/\n/g,'<br>')}</div>
        </div>
      </div>`);
    el.scrollTop = el.scrollHeight;
  });

  return socket;
}

// Voice pakai room ID terpisah, tidak bergantung text channel
const VOICE_ROOM_ID = 'general-voice';

async function joinVoice() {
  if (inVoice) return;
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  } catch(e) {
    showToast('Tidak dapat mengakses mikrofon: ' + e.message, 'error'); return;
  }

  inVoice = true;
  isMuted = false; isDeafened = false; isVideoOn = false;

  // voice-panel hanya ada kalau text channel sudah dibuka
  document.getElementById('voice-panel')?.classList.add('active');
  document.getElementById('ch-voice-bar').classList.add('active');

  voiceParticipants = {};
  addMyVideoTile();

  const s = getSocket();
  s.emit('voice:join', {
    channelId: VOICE_ROOM_ID,
    name: me.namaLengkap,
    photo: me.fotoProfil || null,
  });

  updateVoiceUI();
}

function leaveVoice() {
  if (!inVoice) return;

  if (socket) socket.emit('voice:leave');

  Object.keys(peerConns).forEach(sid => closePeer(sid));
  peerConns = {};

  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }

  inVoice = false; isMuted = false; isDeafened = false; isVideoOn = false;
  voiceParticipants = {};

  document.getElementById('voice-panel')?.classList.remove('active');
  document.getElementById('ch-voice-bar').classList.remove('active');
  document.getElementById('video-grid')?.classList.remove('active');
  if (document.getElementById('video-grid')) document.getElementById('video-grid').innerHTML = '';
  renderVoiceParticipants();
  updateVoiceUI();
}

function toggleMute() {
  isMuted = !isMuted;
  if (localStream) localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
  updateVoiceUI();
  if (socket) socket.emit('voice:status', { muted: isMuted });
}

function toggleDeafen() {
  isDeafened = !isDeafened;
  // Mute semua remote audio
  Object.values(peerConns).forEach(pc => {
    pc.getReceivers().forEach(r => { if (r.track.kind === 'audio') r.track.enabled = !isDeafened; });
  });
  if (isDeafened && !isMuted) { isMuted = true; if (localStream) localStream.getAudioTracks().forEach(t => t.enabled = false); }
  updateVoiceUI();
  if (socket) socket.emit('voice:status', { deafened: isDeafened, muted: isMuted });
}

async function toggleVideo() {
  if (!inVoice) return;
  isVideoOn = !isVideoOn;

  if (isVideoOn) {
    try {
      const vidStream = await navigator.mediaDevices.getUserMedia({ video: true });
      const vidTrack  = vidStream.getVideoTracks()[0];
      localStream.addTrack(vidTrack);
      // Add ke semua peer connections + renegotiate
      for (const [sid, pc] of Object.entries(peerConns)) {
        pc.addTrack(vidTrack, localStream);
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        socket.emit('voice:offer', { targetSocketId: sid, offer });
      }
      updateMyVideoTile(true);
      document.getElementById('video-grid').classList.add('active');
    } catch(e) { isVideoOn = false; showToast('Tidak dapat mengakses kamera: ' + e.message, 'error'); }
  } else {
    const vidTracks = localStream.getVideoTracks();
    vidTracks.forEach(t => { t.stop(); localStream.removeTrack(t); });
    updateMyVideoTile(false);
    // Sembunyikan grid jika tidak ada yang video on
    const hasOtherVideo = Object.values(voiceParticipants).some(p => p.userId !== me._id && p.videoOn);
    if (!hasOtherVideo) document.getElementById('video-grid').classList.remove('active');
  }

  updateVoiceUI();
  if (socket) socket.emit('voice:status', { videoOn: isVideoOn });
}

function updateVoiceUI() {
  const bar = document.getElementById('ch-voice-bar');
  if (bar) bar.classList.toggle('active', inVoice);

  const muteBtn  = document.getElementById('vc-mute');
  const deafBtn  = document.getElementById('vc-deafen');
  const vidBtn   = document.getElementById('vc-video');
  const voiceChItem = document.getElementById('voice-ch-item');

  if (muteBtn) {
    muteBtn.className = 'vc-mini-btn' + (isMuted ? ' off' : '');
    muteBtn.innerHTML = `<i class="ti ${isMuted ? 'ti-microphone-off' : 'ti-microphone'}"></i>`;
    muteBtn.title = isMuted ? 'Unmute' : 'Mute';
  }
  if (deafBtn) {
    deafBtn.className = 'vc-mini-btn' + (isDeafened ? ' off' : '');
    deafBtn.title = isDeafened ? 'Undeafen' : 'Deafen';
  }
  if (vidBtn) {
    vidBtn.className = 'vc-mini-btn' + (isVideoOn ? '' : '');
    vidBtn.innerHTML = `<i class="ti ${isVideoOn ? 'ti-video' : 'ti-video-off'}"></i>`;
    vidBtn.title = isVideoOn ? 'Matikan Kamera' : 'Nyalakan Kamera';
  }
  if (voiceChItem) {
    voiceChItem.className = 'ch-voice-item' + (inVoice ? ' in-voice' : '');
  }

  // voice-panel ada di dalam area chat, mungkin belum dirender
  document.getElementById('voice-panel')?.classList.toggle('active', inVoice);
}

// ── WebRTC Peer ────────────────────────────────────────────────────────────────
const ICE_SERVERS = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

function getOrCreatePeer(socketId, userId) {
  if (peerConns[socketId]) return peerConns[socketId];
  return createPeer(socketId, userId);
}

function createPeer(socketId, userId) {
  const pc = new RTCPeerConnection(ICE_SERVERS);
  peerConns[socketId] = pc;

  if (localStream) localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

  pc.onicecandidate = ({ candidate }) => {
    if (candidate) socket.emit('voice:ice', { targetSocketId: socketId, candidate });
  };

  pc.ontrack = ({ streams, track }) => {
    if (track.kind === 'audio') {
      const audio = document.getElementById('audio-' + socketId) || document.createElement('audio');
      audio.id  = 'audio-' + socketId;
      audio.srcObject = streams[0];
      audio.autoplay  = true;
      if (isDeafened) audio.muted = true;
      document.body.appendChild(audio);
    }
    if (track.kind === 'video') {
      addRemoteVideoTile(socketId, userId, streams[0]);
    }
  };

  pc.onconnectionstatechange = () => {
    if (['disconnected','failed','closed'].includes(pc.connectionState)) closePeer(socketId);
  };

  return pc;
}

async function createOffer(targetSocketId) {
  const pc    = getOrCreatePeer(targetSocketId, null);
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  socket.emit('voice:offer', { targetSocketId, offer });
}

function closePeer(socketId) {
  const pc = peerConns[socketId];
  if (pc) { pc.close(); delete peerConns[socketId]; }
  const audio = document.getElementById('audio-' + socketId);
  if (audio) audio.remove();
}

// ── Video tiles ────────────────────────────────────────────────────────────────
function addMyVideoTile() {
  const grid = document.getElementById('video-grid');
  const tile = document.createElement('div');
  tile.className = 'video-tile';
  tile.id = 'vtile-me';
  tile.style.flex = '1 1 300px';
  tile.innerHTML = `
    <video id="local-video" autoplay muted playsinline style="transform:scaleX(-1)"></video>
    <div class="vt-name">${escHtml(me.namaLengkap)} (Anda)</div>`;
  grid.appendChild(tile);
}

function updateMyVideoTile(show) {
  const vid = document.getElementById('local-video');
  if (!vid) return;
  if (show) {
    const vidTrack = localStream?.getVideoTracks()[0];
    if (vidTrack) {
      const stream = new MediaStream([vidTrack]);
      vid.srcObject = stream;
    }
  } else {
    vid.srcObject = null;
  }
}

function addRemoteVideoTile(socketId, userId, stream) {
  const grid = document.getElementById('video-grid');
  if (document.getElementById('vtile-' + socketId)) return;
  const p    = Object.values(voiceParticipants).find(x => x.socketId === socketId || x.userId === userId) || {};
  const name = p.name || 'User';
  const tile = document.createElement('div');
  tile.className = 'video-tile';
  tile.id = 'vtile-' + socketId;
  tile.style.flex = '1 1 300px';
  tile.innerHTML = `<video autoplay playsinline></video><div class="vt-name">${escHtml(name)}</div>`;
  tile.querySelector('video').srcObject = stream;
  grid.appendChild(tile);
  grid.classList.add('active');
}

function removeVideoTile(socketId) {
  const tile = document.getElementById('vtile-' + socketId);
  if (tile) tile.remove();
}

// ── Render voice participants ──────────────────────────────────────────────────
function renderVoiceParticipants() {
  const list = Object.values(voiceParticipants);
  const allParts = inVoice
    ? [{ userId: me._id, name: me.namaLengkap, photo: me.fotoProfil, muted: isMuted, deafened: isDeafened, videoOn: isVideoOn, isSelf: true }, ...list.filter(p => p.userId !== me._id)]
    : list;

  // Render di voice-panel dalam chat area
  const el    = document.getElementById('voice-participants');
  const count = document.getElementById('voice-count');
  if (el) {
    if (count) count.textContent = allParts.length + ' peserta';
    el.innerHTML = allParts.map(p => {
      const inits    = (p.name || '?').split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
      const avColors = ['#5B4FE8','#16A34A','#EA580C','#0D9488','#DB2777'];
      const avColor  = avColors[inits.charCodeAt(0) % avColors.length];
      const avHtml   = p.photo ? `<img src="${p.photo}" alt="">` : inits;
      return `<div class="voice-participant${p.muted ? ' muted' : ''}">
        <div class="vp-av" style="background:${avColor}">${avHtml}</div>
        <span class="vp-name">${escHtml(p.name)}${p.isSelf ? ' (Anda)' : ''}</span>
        <div class="vp-icons">
          <i class="ti ${p.muted ? 'ti-microphone-off ic-mic' : 'ti-microphone ic-mic'}"></i>
          ${p.videoOn ? '<i class="ti ti-video"></i>' : ''}
        </div>
      </div>`;
    }).join('');
  }

  // Render di left panel (bawah voice channel item)
  const lpEl = document.getElementById('voice-ch-participants');
  if (lpEl) {
    lpEl.innerHTML = allParts.map(p => {
      const inits    = (p.name || '?').split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
      const avColors = ['#5B4FE8','#16A34A','#EA580C','#0D9488','#DB2777'];
      const avColor  = avColors[inits.charCodeAt(0) % avColors.length];
      const avHtml   = p.photo ? `<img src="${p.photo}" alt="">` : inits;
      return `<div class="ch-vp-row">
        <div class="ch-vp-av" style="background:${avColor}">${avHtml}</div>
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(p.name)}${p.isSelf ? ' 🎤' : ''}</span>
        ${p.muted ? '<i class="ti ti-microphone-off" style="font-size:11px;color:#EF4444"></i>' : ''}
      </div>`;
    }).join('');
  }
}
